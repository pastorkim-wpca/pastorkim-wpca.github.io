<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#f5f5f7;--card:#fff;--ink:#1d1d1f;--sub:#6e6e73;--line:#e3e3e6;--accent:#8B4C2F}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",
    "Segoe UI",Roboto,"Helvetica Neue",sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5}
  header{text-align:center;padding:56px 20px 28px}
  header .kicker{font-size:14px;letter-spacing:.06em;color:var(--sub);font-weight:600}
  header h1{font-size:clamp(28px,6vw,44px);font-weight:800;letter-spacing:-.02em;margin:8px 0 6px}
  header .meta{font-size:15px;color:var(--sub)}
  header .rule{width:44px;height:4px;border-radius:2px;background:var(--accent);margin:20px auto 0;opacity:.85}
  .grid{max-width:1200px;margin:0 auto;padding:8px 14px 60px;
    display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
  @media(max-width:560px){.grid{grid-template-columns:repeat(2,1fr);gap:7px;padding:8px 10px 48px}}
  .tile{position:relative;display:block;aspect-ratio:4/3;overflow:hidden;border-radius:14px;
    background:#e9e9ec;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:zoom-in;
    -webkit-tap-highlight-color:transparent}
  .tile img{width:100%;height:100%;object-fit:cover;display:block;
    transition:transform .45s cubic-bezier(.2,.7,.2,1)}
  .tile:hover img{transform:scale(1.06)}
  footer{text-align:center;padding:0 20px 60px;color:var(--sub);font-size:14px}
  footer a{color:var(--accent);text-decoration:none;font-weight:600}
  /* lightbox */
  .lb{position:fixed;inset:0;background:rgba(0,0,0,.94);display:none;z-index:99;
    align-items:center;justify-content:center;touch-action:pan-y;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
  .lb.open{display:flex}
  .lb img{max-width:96vw;max-height:88vh;object-fit:contain;border-radius:6px;
    box-shadow:0 12px 50px rgba(0,0,0,.5);user-select:none;-webkit-user-drag:none}
  .lb .count{position:absolute;top:calc(16px + env(safe-area-inset-top));left:0;right:0;
    text-align:center;color:#fff;font-size:14px;font-weight:600;opacity:.85;letter-spacing:.02em}
  .lb button{position:absolute;background:rgba(255,255,255,.12);border:0;color:#fff;
    width:50px;height:50px;border-radius:50%;font-size:24px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:background .2s;
    -webkit-tap-highlight-color:transparent}
  .lb button:hover{background:rgba(255,255,255,.25)}
  .lb .close{top:calc(12px + env(safe-area-inset-top));right:14px;width:44px;height:44px;font-size:22px}
  .lb .prev{left:14px;top:50%;transform:translateY(-50%)}
  .lb .next{right:14px;top:50%;transform:translateY(-50%)}
  @media(max-width:560px){.lb .prev,.lb .next{width:42px;height:42px;font-size:20px}
    .lb img{max-width:100vw;max-height:82vh}}
</style>

<script>
  const FULL = ["001.jpg","002.jpg","003.jpg","004.jpg","005.jpg","006.jpg","007.jpg","008.jpg","009.jpg","010.jpg","011.jpg","012.jpg","013.jpg","014.jpg","015.jpg","016.jpg","017.jpg","018.jpg","019.jpg","020.jpg","021.jpg","022.jpg","023.jpg","024.jpg","025.jpg","026.jpg","027.jpg","028.jpg","029.jpg","030.jpg","031.jpg","032.jpg","033.jpg","034.jpg","035.jpg","036.jpg","037.jpg","038.jpg","039.jpg","040.jpg","041.jpg","042.jpg","043.jpg","044.jpg","045.jpg","046.jpg","047.jpg","048.jpg"];
  const lb=document.getElementById('lb'), img=document.getElementById('lbimg'),
        count=document.getElementById('count');
  let cur=0;
  function show(i){cur=(i+FULL.length)%FULL.length;
    img.src='full/'+FULL[cur]; count.textContent=(cur+1)+' / '+FULL.length;}
  function open(i){show(i); lb.classList.add('open'); document.body.style.overflow='hidden';}
  function close(){lb.classList.remove('open'); img.src=''; document.body.style.overflow='';}
  document.getElementById('grid').addEventListener('click',e=>{
    const a=e.target.closest('.tile'); if(!a)return; e.preventDefault(); open(+a.dataset.i);});
  document.getElementById('close').onclick=close;
  document.getElementById('prev').onclick=e=>{e.stopPropagation();show(cur-1);};
  document.getElementById('next').onclick=e=>{e.stopPropagation();show(cur+1);};
  lb.addEventListener('click',e=>{if(e.target===lb)close();});
  document.addEventListener('keydown',e=>{if(!lb.classList.contains('open'))return;
    if(e.key==='Escape')close(); else if(e.key==='ArrowLeft')show(cur-1);
    else if(e.key==='ArrowRight')show(cur+1);});
  // swipe (mobile)
  let x0=null;
  lb.addEventListener('touchstart',e=>x0=e.touches[0].clientX,{passive:true});
  lb.addEventListener('touchend',e=>{if(x0===null)return;
    const dx=e.changedTouches[0].clientX-x0;
    if(Math.abs(dx)>50) show(dx<0?cur+1:cur-1); x0=null;},{passive:true});
</script>
